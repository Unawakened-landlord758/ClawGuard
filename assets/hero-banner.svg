<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="170" y1="76" x2="1413" y2="853" gradientUnits="userSpaceOnUse">
            <stop stop-color="#08111F" />
            <stop offset="0.45" stop-color="#111B33" />
            <stop offset="1" stop-color="#1A1140" />
        </linearGradient>
        <linearGradient id="glow" x1="292" y1="166" x2="1263" y2="785" gradientUnits="userSpaceOnUse">
            <stop stop-color="#21D4FD" />
            <stop offset="0.5" stop-color="#7B61FF" />
            <stop offset="1" stop-color="#FF4D8D" />
        </linearGradient>
        <filter id="blur" x="60" y="30" width="1480" height="840" filterUnits="userSpaceOnUse"
            color-interpolation-filters="sRGB">
            <feGaussianBlur stdDeviation="70" />
        </filter>
    </defs>

    <rect width="1600" height="900" rx="32" fill="url(#bg)" />
    <g opacity="0.3" filter="url(#blur)">
        <circle cx="335" cy="230" r="180" fill="#1ED4FF" />
        <circle cx="1180" cy="210" r="170" fill="#7B61FF" />
        <circle cx="1190" cy="650" r="210" fill="#FF4D8D" />
    </g>

    <rect x="84" y="84" width="1432" height="732" rx="28" fill="rgba(255,255,255,0.04)"
        stroke="rgba(255,255,255,0.10)" />

    <g opacity="0.9">
        <rect x="120" y="122" width="170" height="42" rx="21" fill="rgba(255,255,255,0.08)" />
        <text x="145" y="149" fill="#9EE7FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24"
            font-weight="700">OPENCLAW SECURITY</text>
    </g>

    <text x="120" y="286" fill="white" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="108"
