    <text x="120" y="360" fill="#9CAFE0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="42"
        font-weight="600">The antivirus for OpenClaw</text>

    <text x="120" y="452" fill="#DDE6FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30"
        font-weight="500">Blocks dangerous actions, scans skills, stops secret leaks,</text>
    <text x="120" y="496" fill="#DDE6FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30"
        font-weight="500">and puts humans back in control.</text>

    <g>
        <rect x="120" y="566" width="196" height="58" rx="29" fill="rgba(33,212,253,0.14)"
            stroke="rgba(33,212,253,0.48)" />
        <text x="154" y="603" fill="#A8F1FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="26"
            font-weight="700">Approve</text>

        <rect x="334" y="566" width="181" height="58" rx="29" fill="rgba(123,97,255,0.14)"
            stroke="rgba(123,97,255,0.5)" />
        <text x="366" y="603" fill="#CFC7FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="26"
            font-weight="700">Protect</text>

        <rect x="533" y="566" width="186" height="58" rx="29" fill="rgba(255,77,141,0.14)"
            stroke="rgba(255,77,141,0.5)" />
        <text x="565" y="603" fill="#FFC5D9" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="26"
