        <text x="1010" y="666" fill="url(#glow)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="82"
            font-weight="800">58 / 100</text>
        <text x="1012" y="703" fill="#9CAFE0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20">Public
            exposure · No approval gate · Sensitive directories open</text>
    </g>
</svg>